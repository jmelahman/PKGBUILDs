name: Deploy to AUR

on:
  push:
    branches:
      - master
  schedule:
    # Nightly fallback in case the push-triggered deploy failed.
    - cron: "25 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  push-to-remote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # ratchet:webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to remote repository
        run: |
          FAILED=0
          for dir in **/; do
            [[ "$dir" =~ ^[a-zA-Z0-9/_-]+$ ]] || { echo "Invalid input"; exit 1; }
            PACKAGE="${dir///}"
            if ! git subtree push "--prefix=$PACKAGE" "ssh://aur@aur.archlinux.org/$PACKAGE.git" master; then
              echo "::error::subtree push failed for $PACKAGE"
              FAILED=1
            fi
          done
          exit "$FAILED"
